server:
  port: 8080

spring:
  application:
    name: douyin-shipping-tool
  datasource:
    url: jdbc:h2:file:./data/shipping_db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# 轨迹同步定时任务配置
tracking:
  sync:
    cron: "0 */5 * * * ?"  # 每5分钟执行一次
    enabled: true
  fetch:
    cron: "0 */10 * * * ?"  # 每10分钟执行一次
    enabled: true

# API配置
api:
  # 抖店API配置
  douyin:
    app-key: your_app_key_here
    app-secret: your_app_secret_here
    shop-id: your_shop_id_here
    gateway-url: https://openapi-fxg.jinritemai.com
    sandbox: false
    sandbox-url: https://openapi-sandbox.jinritemai.com
  # 快递鸟API配置
  kdniao:
    e-business-id: your_ebusiness_id_here
    api-key: your_api_key_here
    req-url: https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx
    # 回调地址（可选，用于接收快递鸟推送的轨迹）
    # callback-url: https://your-domain.com/api/kdniao/callback
