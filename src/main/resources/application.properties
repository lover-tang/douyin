# Server Configuration
server.port=8080

# Application Name
spring.application.name=kdniao-api-tool

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/douyin_shipping?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.douyin.shipping.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-executor-type=reuse

# Kdniao API Configuration
api.kdniao.eBusinessId=1916295
api.kdniao.apiKey=05d4550f-9b33-42b6-8480-51ac90c6d2b4
api.kdniao.reqUrl=https://api.kdniao.com/api/dist
